name: Build JavaScriptCore (Native macOS ARM64)

on:
  workflow_dispatch:

jobs:
  build-mac-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout Specific WebKit Branch
        uses: actions/checkout@v4
        with:
          repository: WebKit/WebKit
          ref: safari-7621.2.5.10-branch

      - name: Install Build Tools via Homebrew
        run: |
          brew update
          brew install cmake ninja ccache

      - name: Compile JavaScriptCore (macOS)
        run: |
          Tools/Scripts/build-jsc --jsc-only --release --cmakeargs="-GNinja"

      - name: Archive macOS Executable Binary
        uses: actions/upload-artifact@v4
        with:
          name: jsc-macos-arm64-7621
          path: WebKitBuild/Release/bin/jsc