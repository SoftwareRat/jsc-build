name: Build JavaScriptCore

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: WebKit/WebKit
          ref: safari-7621.2.5.10-branch
          fetch-depth: 1

      - name: Install deps
        run: |
          brew install cmake ninja

      - name: Clean
        run: |
          rm -rf WebKitBuild

      - name: Force ISO Malloc
        run: |
          sed -i '' 's/#define USE_ISO_MALLOC 0/#define USE_ISO_MALLOC 1/' Source/WTF/wtf/PlatformUse.h || true

      - name: Build JSC
        run: |
          export CFLAGS="-Wno-error=macro-redefined"
          export CXXFLAGS="-Wno-error=macro-redefined"
          Tools/Scripts/build-jsc --jsc-only --release

      - name: Find binary
        run: |
          find WebKitBuild -name jsc -type f || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jsc-build-output
          path: WebKitBuild