name: Build JavaScriptCore

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: WebKit/WebKit
          ref: safari-7621.2.5.10-branch
          fetch-depth: 1

      - name: Install deps
        run: |
          brew install cmake ninja

      - name: Clean
        run: |
          rm -rf WebKitBuild

      - name: Disable TZone
        run: |
          grep -RIl "TZoneLog\|TZoneHeapManager" Source | while read f; do
            echo "Checking $f"
          done

          find Source -name '*.h' -o -name '*.cpp' | while read f; do
            sed -i '' 's/ENABLE_TZONE 1/ENABLE_TZONE 0/g' "$f" || true
            sed -i '' 's/USE_TZONE 1/USE_TZONE 0/g' "$f" || true
          done

      - name: Build JSC
        run: |
          export CFLAGS="-Wno-error=macro-redefined"
          export CXXFLAGS="-Wno-error=macro-redefined"
          export LDFLAGS="-framework Foundation -framework CoreFoundation -lobjc"

          Tools/Scripts/build-jsc --jsc-only --release

      - name: Find binary
        run: |
          find WebKitBuild -name jsc -type f || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jsc-build-output
          path: WebKitBuild